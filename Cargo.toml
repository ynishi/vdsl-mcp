[package]
name = "vdsl-mcp"
version = "0.1.0"
edition = "2021"
description = "VDSL MCP — AI-native image generation platform"
license = "MIT OR Apache-2.0"

[dependencies]
rmcp = { version = "0.15", features = ["server", "transport-io", "macros"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1.2"
thiserror = "2"
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "multipart", "stream"] }
urlencoding = "2"
tempfile = "3"

[dev-dependencies]
insta = { version = "1", features = ["json"] }
tempfile = "3"
